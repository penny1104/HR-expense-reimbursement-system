<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - HR 差旅報銷系統</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #22277F;
            --brand-secondary: #47704C;
        }

        body, html {
            height: 100%;
            background-color: #F8FAFC;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border: none;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 400px;
            padding: 3rem 2.5rem;
        }

        .login-card img {
            width: 60px;
            margin-bottom: 1.5rem;
        }

        .form-control-pill {
            border-radius: 50px;
            padding: 0.8rem 1.5rem;
            background-color: #F1F5F9;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .form-control-pill:focus {
            background-color: white;
            border-color: var(--brand-primary);
            box-shadow: 0 0 0 4px rgba(34, 39, 127, 0.1);
        }

        .btn-brand {
            border-radius: 50px;
            background-color: var(--brand-primary);
            color: white;
            padding: 0.8rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-brand:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(34, 39, 127, 0.25);
            color: white;
        }

        .alert-custom {
            border-radius: 12px;
            border: none;
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <img src="{{ url_for('static', filename='images/logo1.png') }}" alt="Logo">
        <h3 class="mb-4 fw-bold" style="color: var(--brand-primary);">登入</h3>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-custom alert-dismissible fade show text-start" role="alert">
                        <small>{{ message }}</small>
                        <button type="button" class="btn-close py-2" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('main.login') }}">
            <div class="mb-3 text-start">
                <input type="text" class="form-control form-control-pill" id="email" name="email" placeholder="請輸入員工編號" required>
            </div>
            <div class="mb-2 text-start">
                <input type="password" class="form-control form-control-pill" id="password" name="password" placeholder="密碼" required>
            </div>
            
            <div class="d-flex justify-content-end mb-4">
                <a href="#" class="text-decoration-none small text-muted">忘記密碼？</a>
            </div>
            
            <button class="btn btn-brand w-100" type="submit">登入</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
