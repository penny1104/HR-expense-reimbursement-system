<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - HR系統資料庫</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1A2530;
            --primary-hover: #0D1620;
            --bg-color: #F8F9FA;
            --card-bg: #FFFFFF;
            --border-color: #e2e8f0;
            --text-main: #1A2530;
            --text-muted: #64748b;
            --accent-green: #00C48F;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 裝飾性背景圓球 - 調降飽和度與對比 */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.4;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: #e2e8f0;
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: #cbd5e1;
            bottom: -50px;
            right: -50px;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            z-index: 1;
            transform: translateY(20px);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            color: var(--text-main);
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header p {
            margin: 8px 0 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            background: #F8F9FA;
            transition: all 0.2s ease;
            outline: none;
            color: var(--text-main);
        }

        .form-group input:focus {
            background: #FFFFFF;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 37, 48, 0.05);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26, 37, 48, 0.15);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            background: #fef2f2;
            color: #dc2626;
            font-size: 14px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid #fecaca;
        }

        .test-accounts {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px dashed var(--border-color);
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
        }

        .test-accounts code {
            background: var(--bg-color);
            padding: 3px 6px;
            border-radius: 4px;
            color: var(--primary);
            font-weight: 500;
            border: 1px solid var(--border-color);
        }
    </style>
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="login-card">
        <div class="header">
            <h1>HR系統資料庫</h1>
            <p>歡迎回來，請登入您的帳戶</p>
        </div>

        {% with messages = get_flashed_messages(category_filter=["danger"]) %}
        {% if messages %}
        {% for message in messages %}
        <div class="alert">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">使用者帳號</label>
                <input type="text" id="username" name="username" placeholder="請輸入帳號" required autocomplete="off">
            </div>

            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" name="password" placeholder="請輸入密碼" required>
            </div>

            <button type="submit" class="btn-login">登入系統</button>
        </form>

        <div class="test-accounts">
            測試帳號：<br>
            管理員: <code>admin</code> / <code>admin123</code>
        </div>
    </div>
</body>

</html>
